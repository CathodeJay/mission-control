version: "3.9"

services:
  mission-control:
    build: .
    container_name: mission-control
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-ws://host.docker.internal:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - MISSION_CONTROL_PORT=3100
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/api/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
